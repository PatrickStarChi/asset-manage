<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量打印二维码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    .no-print {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .no-print h2 {
      margin-bottom: 15px;
      color: #1f2937;
    }

    .no-print label {
      display: block;
      margin-bottom: 5px;
      color: #4b5563;
      font-weight: 500;
    }

    .no-print select,
    .no-print input {
      padding: 8px 12px;
      border: 2px solid #e5e7eb;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 15px;
      width: 100%;
    }

    .asset-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin: 15px 0;
      max-height: 300px;
      overflow-y: auto;
    }

    .asset-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: #f9fafb;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .asset-item:hover {
      background: #e5e7eb;
    }

    .asset-item.selected {
      background: #dbeafe;
      border: 2px solid #3b82f6;
    }

    .asset-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-success {
      background: #10b981;
      color: #fff;
    }

    .btn-success:hover {
      background: #059669;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    /* 打印区域 */
    .print-container {
      display: none;
      background: #fff;
      padding: 10mm;
    }

    .print-container.active {
      display: block;
    }

    /* A4 布局 */
    .a4-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      padding: 10mm;
    }

    /* 12 张布局 (3x4) */
    .layout-12 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4mm;
      height: 277mm;
    }

    /* 14 张布局 (2x7) */
    .layout-14 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 3mm;
      height: 277mm;
    }

    /* 二维码卡片 */
    .qr-card {
      border: 1px dashed #999;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      page-break-inside: avoid;
      background: #fff;
    }

    .qr-card img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 8px;
      display: block;
    }

    .qr-card .asset-name {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      color: #000;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      line-height: 1.2;
    }

    /* 裁剪线标记 */
    .crop-mark {
      position: fixed;
      width: 5mm;
      height: 5mm;
      border: 1px solid #000;
    }

    /* 打印样式 */
    @media print {
      @page {
        size: A4;
        margin: 0;
      }

      body {
        background: #fff;
        padding: 0;
      }

      .no-print {
        display: none !important;
      }

      .print-container {
        display: block !important;
      }

      .a4-page {
        margin: 0;
        padding: 10mm;
      }

      .qr-card {
        border: 1px dashed #999;
      }
    }
  </style>
  <style>
    .loading-tip {
      padding: 20px;
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <!-- 选择区域 -->
  <div class="no-print">
    <h2>📦 批量打印二维码</h2>
    
    <div>
      <label>每页打印数量：</label>
      <select id="layout-select">
        <option value="12">12 张/页 (3×4) - 二维码 120px</option>
        <option value="14">14 张/页 (2×7) - 二维码 120px</option>
      </select>
    </div>

    <div>
      <label>选择要打印的资产（<span id="selected-count">0</span> 已选）：</label>
      <div class="asset-list" id="asset-list"></div>
    </div>

    <div class="button-group">
      <button class="btn btn-primary" onclick="selectAll()">全选</button>
      <button class="btn btn-primary" onclick="deselectAll()">取消全选</button>
      <button class="btn btn-primary" onclick="testQRCode()">🧪 测试二维码</button>
      <button class="btn btn-success" onclick="generatePrint()">🖨️ 生成打印</button>
    </div>
    
    <div id="test-result" style="margin-top: 15px; padding: 10px; background: #f9fafb; border-radius: 6px; display: none;">
      <strong>测试结果：</strong>
      <div id="test-output"></div>
    </div>
  </div>

  <!-- 打印区域 -->
  <div class="print-container" id="print-container"></div>

  <script>
    let allAssets = [];
    let selectedAssets = new Set();

    // 加载资产列表
    async function loadAssets() {
      try {
        const token = localStorage.getItem('token');
        const res = await fetch('/api/assets', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        allAssets = await res.json();
        renderAssetList();
      } catch (err) {
        alert('加载资产失败');
        console.error(err);
      }
    }

    // 渲染资产列表
    function renderAssetList() {
      const container = document.getElementById('asset-list');
      container.innerHTML = allAssets.map(asset => `
        <div class="asset-item" onclick="toggleAsset(${asset.id})">
          <input type="checkbox" id="asset-${asset.id}" ${selectedAssets.has(asset.id) ? 'checked' : ''}>
          <label for="asset-${asset.id}" style="cursor: pointer; flex: 1; margin: 0;">
            ${asset.name} (${asset.quantity}${asset.unit || '个'})
          </label>
        </div>
      `).join('');
      updateSelectedCount();
    }

    // 切换选择
    function toggleAsset(id) {
      if (selectedAssets.has(id)) {
        selectedAssets.delete(id);
      } else {
        selectedAssets.add(id);
      }
      renderAssetList();
    }

    // 全选
    function selectAll() {
      allAssets.forEach(asset => selectedAssets.add(asset.id));
      renderAssetList();
    }

    // 取消全选
    function deselectAll() {
      selectedAssets.clear();
      renderAssetList();
    }

    // 更新已选数量
    function updateSelectedCount() {
      document.getElementById('selected-count').textContent = selectedAssets.size;
    }

    // 生成打印
    async function generatePrint() {
      if (selectedAssets.size === 0) {
        alert('请至少选择一个资产');
        return;
      }

      const layout = document.getElementById('layout-select').value;
      const assetsToPrint = allAssets.filter(a => selectedAssets.has(a.id));
      
      console.log('开始生成打印:', assetsToPrint.length, '个资产');
      
      const container = document.getElementById('print-container');
      container.innerHTML = '<div style="padding:20px;text-align:center;">正在生成二维码，请稍候...</div>';
      container.classList.add('active');
      container.scrollIntoView({ behavior: 'smooth' });

      // 清空并重新生成
      container.innerHTML = '';

      // 分页
      const perPage = parseInt(layout);
      const pages = Math.ceil(assetsToPrint.length / perPage);
      
      console.log('共', pages, '页');

      for (let p = 0; p < pages; p++) {
        const pageAssets = assetsToPrint.slice(p * perPage, (p + 1) * perPage);
        const pageDiv = document.createElement('div');
        pageDiv.className = 'a4-page';
        
        const gridDiv = document.createElement('div');
        gridDiv.className = layout === '12' ? 'layout-12' : 'layout-14';
        
        console.log('生成第', p + 1, '页，', pageAssets.length, '个资产');
        
        for (const asset of pageAssets) {
          const cardDiv = await createQRCard(asset);
          gridDiv.appendChild(cardDiv);
        }
        
        pageDiv.appendChild(gridDiv);
        container.appendChild(pageDiv);
      }

      console.log('生成完成');
      
      // 等待图片加载完成
      setTimeout(() => {
        const images = container.querySelectorAll('img');
        console.log('等待', images.length, '个图片加载');
        
        if (confirm('已生成打印预览，是否立即打印？')) {
          window.print();
        }
      }, 1000);
    }

    // 创建二维码卡片
    async function createQRCard(asset) {
      const card = document.createElement('div');
      card.className = 'qr-card';
      
      try {
        console.log('[QR] 正在获取:', asset.name, 'ID:', asset.id);
        
        // 调用服务器 API 获取二维码
        const res = await fetch(`/api/assets/${asset.id}/qrcode`);
        const data = await res.json();
        
        if (!res.ok || !data.qrCode) {
          throw new Error(data.error || '二维码生成失败');
        }
        
        console.log('[QR] 获取成功:', asset.name);
        
        // 创建图片
        const img = new Image();
        img.src = data.qrCode;
        img.width = 120;
        img.height = 120;
        img.alt = 'QR Code';
        img.style.marginBottom = '8px';
        
        card.innerHTML = `
          <div class="asset-name">${asset.name}</div>
        `;
        card.appendChild(img);
        
        return card;
      } catch (err) {
        console.error('[QR] 获取失败:', asset.name, err.message);
        card.innerHTML = `
          <div style="color: red; font-size: 10px; text-align: center;">
            ❌ 获取失败<br>${err.message}
          </div>
          <div class="asset-name">${asset.name}</div>
        `;
        return card;
      }
    }

    // 测试二维码生成
    async function testQRCode() {
      const testDiv = document.getElementById('test-result');
      const output = document.getElementById('test-output');
      testDiv.style.display = 'block';
      
      try {
        output.innerHTML = '<span style="color: blue;">⏳ 正在获取测试二维码...</span>';
        
        // 调用服务器 API 获取第一个资产的二维码
        if (allAssets.length === 0) {
          output.innerHTML = '<span style="color: red;">❌ 没有资产可测试</span>';
          return;
        }
        
        const res = await fetch(`/api/assets/${allAssets[0].id}/qrcode`);
        const data = await res.json();
        
        if (!res.ok || !data.qrCode) {
          throw new Error(data.error || '二维码获取失败');
        }
        
        output.innerHTML = `
          <span style="color: green;">✅ 服务器 API 工作正常！</span><br>
          <img src="${data.qrCode}" style="margin-top: 10px; border: 1px solid #ddd;">
        `;
      } catch (err) {
        output.innerHTML = `<span style="color: red;">❌ 错误：${err.message}</span>`;
      }
    }
    
    // 初始化
    loadAssets();
  </script>
</body>
</html>
