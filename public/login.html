<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 资产管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #3498db;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 15px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h1 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 10px;
    }
    .login-header p {
      color: #7f8c8d;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 500;
      font-size: 14px;
    }
    .form-input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    .form-input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 15px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error-message {
      background: #fee;
      color: #e74c3c;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .default-account {
      background: #f0f8ff;
      border: 1px solid #667eea;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
    }
    .default-account h4 {
      color: #667eea;
      margin-bottom: 8px;
    }
    .default-account p {
      color: #555;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>📦 资产管理系统</h1>
      <p>请登录以继续</p>
    </div>
    
    <div id="error-message" class="error-message"></div>
    
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" class="form-input" required placeholder="请输入用户名">
      </div>
      
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" class="form-input" required placeholder="请输入密码">
      </div>
      
      <button type="submit" class="btn" id="submit-btn">登录</button>
    </form>
  </div>

  <script>
    // 检查是否已登录
    const token = localStorage.getItem('token');
    if (token) {
      fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => {
        if (res.ok) {
          window.location.href = '/';
        }
      })
      .catch(() => {});
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const submitBtn = document.getElementById('submit-btn');
      const errorDiv = document.getElementById('error-message');
      
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      errorDiv.style.display = 'none';
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (res.ok && data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          throw new Error(data.error || '登录失败');
        }
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    }
  </script>
</body>
</html>
